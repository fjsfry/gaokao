name: Crawl Hebei Gaokao Public Data
run-name: Crawl Hebei Gaokao data (${{ inputs.years || '2021-2026' }})

on:
  schedule:
    - cron: "0 0,10,20 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/crawl-hebei-gaokao.yml"
      - "crawler/**"
      - "scripts/sync_sqlite_to_supabase.py"
  workflow_dispatch:
    inputs:
      years:
        description: "Years to crawl, separated by spaces"
        required: false
        default: "2021 2022 2023 2024 2025 2026"
      max_pages:
        description: "Max listing pages per seed channel"
        required: false
        default: "20"
      max_list_visits:
        description: "Max discovered list pages to visit"
        required: false
        default: "250"
      replace_existing:
        description: "Clear Supabase tables before import. Use only for intentional full rebuilds."
        required: false
        type: boolean
        default: false

concurrency:
  group: hebei-gaokao-crawler
  cancel-in-progress: false

jobs:
  crawl-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SUPABASE_URL: https://tspotlvffujnlnmsglxj.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONUTF8: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      CRAWL_YEARS: ${{ inputs.years || '2021 2022 2023 2024 2025 2026' }}
      CRAWL_MAX_PAGES: ${{ inputs.max_pages || '20' }}
      CRAWL_MAX_LIST_VISITS: ${{ inputs.max_list_visits || '250' }}
      REPLACE_EXISTING: ${{ inputs.replace_existing || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Supabase sync capability
        id: supabase-sync
        run: |
          if [ -n "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "CAN_SYNC_SUPABASE=true" >> "$GITHUB_ENV"
            echo "can_sync=true" >> "$GITHUB_OUTPUT"
            echo "Supabase service role key is configured; sync step will run." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "CAN_SYNC_SUPABASE=false" >> "$GITHUB_ENV"
            echo "can_sync=false" >> "$GITHUB_OUTPUT"
            {
              echo "Supabase service role key is not configured."
              echo ""
              echo "Crawler, parser, SQLite build, validation, and artifact upload will still run."
              echo "The Supabase sync step will be skipped until SUPABASE_SERVICE_ROLE_KEY is added in repository Actions secrets."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crawler/requirements.txt

      - name: Compile crawler and sync scripts
        run: |
          python -m py_compile \
            crawler/hebei_gaokao_crawler.py \
            crawler/build_hebei_database.py \
            crawler/validate_hebei_database.py \
            scripts/sync_sqlite_to_supabase.py

      - name: Crawl public pages and attachments
        run: |
          YEARS="${CRAWL_YEARS:-2021 2022 2023 2024 2025 2026}"
          python crawler/hebei_gaokao_crawler.py crawl \
            --out data_public \
            --years $YEARS \
            --delay 1.0 \
            --max-pages "${CRAWL_MAX_PAGES:-20}" \
            --max-list-visits "${CRAWL_MAX_LIST_VISITS:-250}" \
            --request-timeout 16 \
            --retries 1

      - name: Parse downloaded spreadsheets
        run: python crawler/hebei_gaokao_crawler.py parse-excel --out data_public

      - name: Build normalized SQLite database
        run: python crawler/build_hebei_database.py --out data_public

      - name: Validate normalized database
        id: validate-db
        continue-on-error: true
        run: |
          python crawler/validate_hebei_database.py \
            --sqlite data_public/hebei_gaokao.sqlite \
            --min-admission-lines 100 \
            --min-score-ranks 100 \
            --min-batch-lines 4

      - name: Sync to Supabase
        if: steps.supabase-sync.outputs.can_sync == 'true' && steps.validate-db.outcome == 'success'
        run: |
          SYNC_ARGS=(--sqlite data_public/hebei_gaokao.sqlite)
          if [ "$REPLACE_EXISTING" = "true" ]; then
            SYNC_ARGS+=(--replace)
          fi
          python scripts/sync_sqlite_to_supabase.py "${SYNC_ARGS[@]}"

      - name: Report skipped Supabase sync
        if: steps.supabase-sync.outputs.can_sync != 'true'
        run: |
          echo "Skipped Supabase sync because SUPABASE_SERVICE_ROLE_KEY is not configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Report skipped Supabase sync after validation failure
        if: steps.supabase-sync.outputs.can_sync == 'true' && steps.validate-db.outcome != 'success'
        run: |
          {
            echo "Skipped Supabase sync because the normalized SQLite validation did not pass."
            echo ""
            echo "The crawl artifact was still uploaded for inspection. Check data_public/metadata/crawl_manifest.json and data_public/crawler.log in the artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload crawl artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hebei-gaokao-crawl-${{ github.run_id }}
          retention-days: 14
          path: |
            data_public/hebei_gaokao.sqlite
            data_public/crawler.log
            data_public/metadata/*.csv
            data_public/metadata/crawl_manifest.json
          if-no-files-found: ignore
