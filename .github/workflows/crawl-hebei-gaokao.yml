name: Crawl Hebei Gaokao Public Data

on:
  schedule:
    - cron: "0 0,10,20 * * *"
  workflow_dispatch:
    inputs:
      years:
        description: "Years to crawl, separated by spaces"
        required: false
        default: "2026"

concurrency:
  group: hebei-gaokao-crawler
  cancel-in-progress: false

jobs:
  crawl-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SUPABASE_URL: https://tspotlvffujnlnmsglxj.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crawler/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r crawler/requirements.txt

      - name: Crawl public pages and attachments
        run: |
          YEARS="${{ github.event.inputs.years }}"
          if [ -z "$YEARS" ]; then YEARS="2026"; fi
          python crawler/hebei_gaokao_crawler.py crawl \
            --out data_public \
            --years $YEARS \
            --delay 1.5 \
            --max-pages 20 \
            --max-list-visits 200

      - name: Parse downloaded spreadsheets
        run: python crawler/hebei_gaokao_crawler.py parse-excel --out data_public

      - name: Build normalized SQLite database
        run: python crawler/build_hebei_database.py --out data_public

      - name: Sync to Supabase
        run: python scripts/sync_sqlite_to_supabase.py --sqlite data_public/hebei_gaokao.sqlite

      - name: Upload crawl artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hebei-gaokao-crawl-${{ github.run_id }}
          path: |
            data_public/hebei_gaokao.sqlite
            data_public/crawler.log
            data_public/metadata/*.csv
          if-no-files-found: ignore
